name: Debugger Strict Coverage

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  ide-debugger:
    name: IDE debugger/runtime suites
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.3"
          elixir-version: "1.20.1"
          version-type: strict
          install-rebar: false
          rebar3-version: "3.24.0"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Run IDE debugger/runtime suites
        working-directory: ide
        run: |
          mix test test/ide/debugger_test.exs \
            test/ide/debugger/runtime_executor_request_test.exs \
            test/ide/debugger/surface_compile_elmx_test.exs \
            test/ide/debugger/auto_fire_message_order_test.exs

      - name: Run debugger template corpus
        working-directory: ide
        run: mix test test/ide/mcp/debugger_template_corpus_test.exs --only template_corpus --max-cases 1

      - name: Run debugger template corpus subscription steps
        working-directory: ide
        run: mix test test/ide/mcp/debugger_template_corpus_test.exs --only template_corpus_step --max-cases 1

  ide-debugger-integration:
    name: IDE debugger integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.3"
          elixir-version: "1.20.1"
          version-type: strict
          install-rebar: false
          rebar3-version: "3.24.0"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Run debugger integration suite
        working-directory: ide
        run: |
          mix test test/ide/debugger/integration \
            test/ide/debugger/configuration_callback_probe_test.exs \
            test/ide/debugger/deferred_companion_bootstrap_test.exs \
            --only integration --include slow --max-cases 1

  elmx-compiled-elixir:
    name: elmx compile + compiled_elixir corpus
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch optional tree-sitter-elm corpus
        id: tree-sitter-corpus
        run: |
          git submodule sync -- vendor/tree-sitter-elm-test-corpus
          if git submodule update --init --recursive vendor/tree-sitter-elm-test-corpus; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Optional corpus unavailable::Skipping tree-sitter corpus gates because vendor/tree-sitter-elm-test-corpus could not be fetched."
            git submodule deinit -f vendor/tree-sitter-elm-test-corpus || true
            rm -rf .git/modules/vendor/tree-sitter-elm-test-corpus vendor/tree-sitter-elm-test-corpus
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.3"
          elixir-version: "1.20.1"
          version-type: strict
          install-rebar: false
          rebar3-version: "3.24.0"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Install elmx dependencies
        working-directory: elmx
        run: mix deps.get

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Run elmx unit tests
        working-directory: elmx
        run: mix test

      - name: Run elmx Dialyzer
        working-directory: elmx
        run: mix dialyzer

      - name: Run elmx coverage and qualified-call gate tests
        working-directory: elmx
        run: |
          mix test test/backend_coverage_gate_test.exs \
            test/qualified_call_audit_test.exs \
            test/phone_template_audit_test.exs

      - name: Run tree-sitter corpus smoke parse gate
        if: steps.tree-sitter-corpus.outputs.available == 'true'
        working-directory: elmx
        run: mix test.ts_corpus_smoke

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Run compiled_elixir template corpus
        working-directory: ide
        env:
          ELMX_TEMPLATE_CORPUS: "1"
        run: mix test --only compiled_elixir_corpus --max-cases 1

      - name: Run elmx template compile gate
        working-directory: ide
        env:
          ELMX_TEMPLATE_COMPILE_GATE: "1"
        run: mix test test/ide/mcp/debugger_template_compile_gate_test.exs --only template_compile_gate
