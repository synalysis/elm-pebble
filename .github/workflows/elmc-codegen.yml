name: elmc Codegen

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  elmc:
    name: elmc compile, tests, Dialyzer, conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1"
          elixir-version: "1.17.3"

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Install elmc dependencies
        working-directory: elmc
        run: mix deps.get

      - name: Compile elmc with warnings as errors
        working-directory: elmc
        run: mix compile --warnings-as-errors

      - name: Run elmc tests
        working-directory: elmc
        run: mix test

      - name: Run elmc Dialyzer
        working-directory: elmc
        run: mix dialyzer

      - name: Run conformance guardrails
        working-directory: elmc
        run: bash scripts/run_conformance_guardrails.sh

  ide-size-report:
    name: IDE compiler size regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1"
          elixir-version: "1.17.3"

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Install elmc dependencies
        working-directory: elmc
        run: mix deps.get

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Compile IDE with warnings as errors
        working-directory: ide
        run: mix compile --warnings-as-errors

      - name: Run size report unit tests
        working-directory: ide
        run: mix test test/ide/size_report_map_path_test.exs

      - name: Check compiler output size against manifest baseline
        working-directory: ide
        run: >
          mix ide.size_report
          --templates game-2048,watchface-tangram-time,watchface-poke-battle
          --baseline-manifest priv/size_report_baselines/flint.json
          --fail-on-regression
          --max-bin-regression 512
          --max-generated-c-regression 8192
          > /tmp/size_report.json

  ide-template-pbw-gate:
    name: IDE template PBW package gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1"
          elixir-version: "1.17.3"

      - name: Install Pebble toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bzip2 \
            ca-certificates \
            curl \
            git \
            libncurses6 \
            libstdc++6 \
            openssl \
            pipx \
            python3 \
            xz-utils \
            zlib1g

      - name: Install pebble-tool and Pebble SDK
        run: |
          pipx install pebble-tool
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          pebble sdk install 4.9.169
          pebble sdk activate 4.9.169
          pebble sdk list

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Install elmc dependencies
        working-directory: elmc
        run: mix deps.get

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Run template PBW package gate
        working-directory: ide
        env:
          ELMC_TEMPLATE_PBW_GATE: "1"
        run: mix test test/ide/template_pbw_gate_test.exs --only template_pbw_gate --max-cases 1
