name: elmc Codegen

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  elmc:
    name: elmc compile, tests, Dialyzer, conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch optional elm-run corpus
        id: elm-run-corpus
        run: |
          git submodule sync -- vendor/elm-run-test_corpus
          if git submodule update --init --recursive vendor/elm-run-test_corpus; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Optional corpus unavailable::Skipping elm-run corpus gates because vendor/elm-run-test_corpus could not be fetched."
            git submodule deinit -f vendor/elm-run-test_corpus || true
            rm -rf .git/modules/vendor/elm-run-test_corpus vendor/elm-run-test_corpus
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch optional tree-sitter-elm corpus
        id: tree-sitter-corpus
        run: |
          git submodule sync -- vendor/tree-sitter-elm-test-corpus
          if git submodule update --init --recursive vendor/tree-sitter-elm-test-corpus; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Optional corpus unavailable::Skipping tree-sitter corpus gates because vendor/tree-sitter-elm-test-corpus could not be fetched."
            git submodule deinit -f vendor/tree-sitter-elm-test-corpus || true
            rm -rf .git/modules/vendor/tree-sitter-elm-test-corpus vendor/tree-sitter-elm-test-corpus
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.3"
          elixir-version: "1.20.1"
          version-type: strict
          install-rebar: false
          rebar3-version: "3.24.0"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Install elmc dependencies
        working-directory: elmc
        run: mix deps.get

      - name: Compile elmc with warnings as errors
        working-directory: elmc
        run: mix compile --warnings-as-errors

      - name: Run elmc tests
        working-directory: elmc
        run: mix test

      - name: Run 2048 RC integration gates
        working-directory: elmc
        run: mix test.rc_2048

      - name: Run elm-run corpus compile gate
        if: steps.elm-run-corpus.outputs.available == 'true'
        working-directory: elmc
        run: mix test.corpus

      - name: Run elm-run corpus execution gate
        if: steps.elm-run-corpus.outputs.available == 'true'
        working-directory: elmc
        run: mix test.corpus_run

      - name: Run elm-run corpus elmx compile gate
        if: steps.elm-run-corpus.outputs.available == 'true'
        working-directory: elmc
        run: mix test.corpus_elmx_smoke

      - name: Run elm-run corpus full elmx compile gate
        if: steps.elm-run-corpus.outputs.available == 'true'
        working-directory: elmc
        timeout-minutes: 15
        run: mix test.corpus_elmx

      - name: Run fixture codegen dual-backend gate
        working-directory: elmc
        run: mix test.fixture_codegen

      - name: Run tree-sitter corpus smoke parse gate
        if: steps.tree-sitter-corpus.outputs.available == 'true'
        working-directory: elm_ex
        run: mix test.ts_corpus_smoke

      - name: Run tree-sitter corpus full parse gate
        if: steps.tree-sitter-corpus.outputs.available == 'true'
        working-directory: elm_ex
        timeout-minutes: 30
        run: mix test.ts_corpus

      - name: Run elmc Dialyzer
        working-directory: elmc
        run: mix dialyzer

      - name: Run conformance guardrails
        working-directory: elmc
        run: bash scripts/run_conformance_guardrails.sh

  ide-size-report:
    name: IDE compiler size regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.3"
          elixir-version: "1.20.1"
          version-type: strict
          install-rebar: false
          rebar3-version: "3.24.0"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Install elmc dependencies
        working-directory: elmc
        run: mix deps.get

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Compile IDE with warnings as errors
        working-directory: ide
        run: mix compile --warnings-as-errors

      - name: Run size report unit tests
        working-directory: ide
        run: mix test test/ide/size_report_map_path_test.exs

      - name: Check compiler output size against manifest baseline
        working-directory: ide
        run: >
          mix ide.size_report
          --templates game-2048,watchface-tangram-time,watchface-poke-battle
          --baseline-manifest priv/size_report_baselines/flint.json
          --fail-on-regression
          --max-bin-regression 512
          --max-generated-c-regression 8192
          > /tmp/size_report.json

  ide-template-pbw-gate:
    name: IDE template PBW package gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Pebble toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bzip2 \
            ca-certificates \
            curl \
            git \
            libncurses6 \
            libstdc++6 \
            nodejs \
            npm \
            openssl \
            pipx \
            python3 \
            xz-utils \
            zlib1g

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.3"
          elixir-version: "1.20.1"
          version-type: strict
          install-rebar: false
          rebar3-version: "3.24.0"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Install pebble-tool and Pebble SDK
        run: |
          pipx install pebble-tool
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          rm -rf "$HOME/.pebble-sdk" "$HOME/.pebble" || true
          pebble sdk install latest
          latest_sdk="$(pebble sdk list | awk '/^Available SDKs:/{in_available=1; next} /^Installed SDKs:/{in_available=0} in_available && $1 ~ /^[0-9]/ {last=$1} END {print last}')"
          if [ -z "${latest_sdk}" ]; then
            echo "Could not resolve latest Pebble SDK" >&2
            pebble sdk list >&2
            exit 1
          fi
          pebble sdk install "${latest_sdk}"
          pebble sdk activate "${latest_sdk}"
          if ! pebble sdk list | awk '/\(active\)/ {found=1} END {exit !found}'; then
            echo "No active Pebble SDK after install" >&2
            pebble sdk list >&2
            exit 1
          fi
          pebble sdk list
          echo "PEBBLE_SDK_ROOT=$HOME/.pebble-sdk/SDKs/current" >> "$GITHUB_ENV"

      - name: Install Elm compiler
        run: npm install -g elm@0.19.1-6

      - name: Install elm_ex dependencies
        working-directory: elm_ex
        run: mix deps.get

      - name: Install elmc dependencies
        working-directory: elmc
        run: mix deps.get

      - name: Install IDE dependencies
        working-directory: ide
        run: mix deps.get

      - name: Run template PBW package gate
        working-directory: ide
        env:
          ELMC_TEMPLATE_PBW_GATE: "1"
        run: mix test test/ide/template_pbw_gate_test.exs --only template_pbw_gate --max-cases 1
