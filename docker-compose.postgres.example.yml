services:
  db:
    image: postgres:16-bookworm
    container_name: elm-pebble-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ide}
      POSTGRES_DB: ${POSTGRES_DB:-ide_prod}
    volumes:
      - elm_pebble_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ide} -d ${POSTGRES_DB:-ide_prod}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elm-pebble-ide:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ELM_PEBBLE_IMAGE:-elm-pebble-ide:postgres}
    container_name: elm-pebble-ide
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ELM_PEBBLE_PORT:-4000}:4000"
    environment:
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: 4000
      IDE_DATA_ROOT: /var/lib/ide
      PROJECTS_ROOT: /var/lib/ide/workspace_projects
      SETTINGS_FILE: /var/lib/ide/config/settings.json
      DATABASE_URL: postgres://${POSTGRES_USER:-ide}:${POSTGRES_PASSWORD:-ide}@db:5432/${POSTGRES_DB:-ide_prod}
      POOL_SIZE: ${POOL_SIZE:-10}
      PEBBLE_SDK_VERSION: ${PEBBLE_SDK_VERSION:-4.9.169}
      INSTALL_PEBBLE_SDK: ${INSTALL_PEBBLE_SDK:-1}
      ELM_PEBBLE_QEMU_BIN: /var/lib/ide/.pebble-sdk/SDKs/current/toolchain/bin/qemu-pebble
      ELM_PEBBLE_PYPKJS_BIN: /opt/pipx/venvs/pebble-tool/bin/pypkjs
      ELM_PEBBLE_QEMU_IMAGE_ROOT: /var/lib/ide/.pebble-sdk/SDKs/current/sdk-core/pebble
      ELM_PEBBLE_QEMU_DATA_ROOT: /usr/share/qemu
      ELM_PEBBLE_QEMU_DOWNLOAD_IMAGES: ${ELM_PEBBLE_QEMU_DOWNLOAD_IMAGES:-1}
      ELM_PEBBLE_WASM_EMULATOR_ROOT: /var/lib/ide/wasm_emulator
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-8eXjTGrTXoJHN8S-sqKoLrXp1xQ8vlqv2Ryr_5wPjMz5f4lAQ9S3v5dvU7uIGrYb}
    volumes:
      - elm_pebble_ide_data:/var/lib/ide
    restart: unless-stopped

volumes:
  elm_pebble_postgres_data:
  elm_pebble_ide_data:
